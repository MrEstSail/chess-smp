<!DOCTYPE html>
<html>
<head>
  <title>Basic Bomberman HTML Game - Mobile Port</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body { height: 100%; margin: 0; background: black; overflow: hidden; font-family: sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    /* Responsive Canvas */
    canvas { 
      background: forestgreen; 
      max-width: 100vw; 
      max-height: 70vh; 
      object-fit: contain;
    }

    /* Mobile Controls Styling */
    .controls {
      display: flex;
      width: 100%;
      justify-content: space-around;
      align-items: center;
      padding: 20px 0;
      user-select: none;
      -webkit-user-select: none;
    }

    .d-pad {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 5px;
    }

    .btn {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      touch-action: manipulation;
    }

    .btn:active { background: rgba(255, 255, 255, 0.5); }
    
    .bomb-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #D72B16;
      font-size: 1.2rem;
    }

    /* Hide controls on desktop if preferred, or keep for all */
    @media (min-width: 1024px) {
      /* .controls { display: none; } */
    }
  </style>
</head>
<body>

  <canvas width="960" height="832" id="game"></canvas>

  <div class="controls">
    <div class="d-pad">
      <div></div>
      <div class="btn" id="up">▲</div>
      <div></div>
      <div class="btn" id="left">◀</div>
      <div></div>
      <div class="btn" id="right">▶</div>
      <div></div>
      <div class="btn" id="down">▼</div>
      <div></div>
    </div>
    <div class="btn bomb-btn" id="bomb">BOMB</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const context = canvas.getContext('2d');
    const grid = 64;
    const numRows = 13;
    const numCols = 15;

    // --- ORIGINAL GAME LOGIC START ---
    const softWallCanvas = document.createElement('canvas');
    const softWallCtx = softWallCanvas.getContext('2d');
    softWallCanvas.width = softWallCanvas.height = grid;
    softWallCtx.fillStyle = 'black';
    softWallCtx.fillRect(0, 0, grid, grid);
    softWallCtx.fillStyle = '#a9a9a9';
    softWallCtx.fillRect(1, 1, grid - 2, 20);
    softWallCtx.fillRect(0, 23, 20, 18);
    softWallCtx.fillRect(22, 23, 42, 18);
    softWallCtx.fillRect(0, 43, 42, 20);
    softWallCtx.fillRect(44, 43, 20, 20);

    const wallCanvas = document.createElement('canvas');
    const wallCtx = wallCanvas.getContext('2d');
    wallCanvas.width = wallCanvas.height = grid;
    wallCtx.fillStyle = 'black';
    wallCtx.fillRect(0, 0, grid, grid);
    wallCtx.fillStyle = 'white';
    wallCtx.fillRect(0, 0, grid - 2, grid - 2);
    wallCtx.fillStyle = '#a9a9a9';
    wallCtx.fillRect(2, 2, grid - 4, grid - 4);

    const types = { wall: '▉', softWall: 1, bomb: 2 };
    let entities = [];
    let cells = [];
    const template = [
      ['▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉'],
      ['▉','x','x', , , , , , , , , ,'x','x','▉'],
      ['▉','x','▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉','x','▉'],
      ['▉','x', , , , , , , , , , , ,'x','▉'],
      ['▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉'],
      ['▉', , , , , , , , , , , , , ,'▉'],
      ['▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉'],
      ['▉', , , , , , , , , , , , , ,'▉'],
      ['▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉'],
      ['▉','x', , , , , , , , , , , ,'x','▉'],
      ['▉','x','▉', ,'▉', ,'▉', ,'▉', ,'▉', ,'▉','x','▉'],
      ['▉','x','x', , , , , , , , , ,'x','x','▉'],
      ['▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉','▉']
    ];

    function generateLevel() {
      cells = [];
      for (let row = 0; row < numRows; row++) {
        cells[row] = [];
        for (let col = 0; col < numCols; col++) {
          if (!template[row][col] && Math.random() < 0.90) {
            cells[row][col] = types.softWall;
          } else if (template[row][col] === types.wall) {
            cells[row][col] = types.wall;
          }
        }
      }
    }

    function blowUpBomb(bomb) {
      if (!bomb.alive) return;
      bomb.alive = false;
      cells[bomb.row][bomb.col] = null;
      const dirs = [{row: -1, col: 0}, {row: 1, col: 0}, {row: 0, col: -1}, {row: 0, col: 1}];
      dirs.forEach((dir) => {
        for (let i = 0; i < bomb.size; i++) {
          const row = bomb.row + dir.row * i;
          const col = bomb.col + dir.col * i;
          const cell = cells[row][col];
          if (cell === types.wall) return;
          entities.push(new Explosion(row, col, dir, i === 0));
          cells[row][col] = null;
          if (cell === types.bomb) {
            const nextBomb = entities.find((e) => e.type === types.bomb && e.row === row && e.col === col);
            if (nextBomb) blowUpBomb(nextBomb);
          }
          if (cell) return;
        }
      });
    }

    function Bomb(row, col, size, owner) {
      this.row = row; this.col = col; this.radius = grid * 0.4; this.size = size;
      this.owner = owner; this.alive = true; this.type = types.bomb; this.timer = 3000;
      this.update = function(dt) {
        this.timer -= dt;
        if (this.timer <= 0) return blowUpBomb(this);
        const interval = Math.ceil(this.timer / 500);
        this.radius = (interval % 2 === 0) ? grid * 0.4 : grid * 0.5;
      };
      this.render = function() {
        const x = (this.col + 0.5) * grid;
        const y = (this.row + 0.5) * grid;
        context.fillStyle = 'black';
        context.beginPath(); context.arc(x, y, this.radius, 0, 2 * Math.PI); context.fill();
        const fuseY = (this.radius === grid * 0.5 ? grid * 0.15 : 0);
        context.strokeStyle = 'white'; context.lineWidth = 5;
        context.beginPath(); context.arc((this.col + 0.75) * grid, (this.row + 0.25) * grid - fuseY, 10, Math.PI, -Math.PI / 2); context.stroke();
      };
    }

    function Explosion(row, col, dir, center) {
      this.row = row; this.col = col; this.dir = dir; this.alive = true; this.timer = 300;
      this.update = function(dt) { this.timer -= dt; if (this.timer <=0) this.alive = false; };
      this.render = function() {
        const x = this.col * grid; const y = this.row * grid;
        context.fillStyle = '#D72B16'; context.fillRect(x, y, grid, grid);
        context.fillStyle = '#F39642';
        if (center || this.dir.col) context.fillRect(x, y + 6, grid, grid - 12);
        if (center || this.dir.row) context.fillRect(x + 6, y, grid - 12, grid);
        context.fillStyle = '#FFE5A8';
        if (center || this.dir.col) context.fillRect(x, y + 12, grid, grid - 24);
        if (center || this.dir.row) context.fillRect(x + 12, y, grid - 24, grid);
      };
    }

    const player = {
      row: 1, col: 1, numBombs: 1, bombSize: 3, radius: grid * 0.35,
      render() {
        const x = (this.col + 0.5) * grid;
        const y = (this.row + 0.5) * grid;
        context.save(); context.fillStyle = 'white';
        context.beginPath(); context.arc(x, y, this.radius, 0, 2 * Math.PI); context.fill();
        context.restore();
      }
    };
    // --- ORIGINAL GAME LOGIC END ---

    // Movement Function (Shared by Keyboard and Touch)
    function movePlayer(dRow, dCol) {
      let row = player.row + dRow;
      let col = player.col + dCol;
      if (!cells[row][col]) {
        player.row = row;
        player.col = col;
      }
    }

    function placeBomb() {
      let row = player.row;
      let col = player.col;
      const bombCount = entities.filter((e) => e.type === types.bomb && e.owner === player).length;
      if (!cells[row][col] && bombCount < player.numBombs) {
        const bomb = new Bomb(row, col, player.bombSize, player);
        entities.push(bomb);
        cells[row][col] = types.bomb;
      }
    }

    // Keyboard Listeners
    document.addEventListener('keydown', function(e) {
      if (e.which === 37) movePlayer(0, -1);
      else if (e.which === 38) movePlayer(-1, 0);
      else if (e.which === 39) movePlayer(0, 1);
      else if (e.which === 40) movePlayer(1, 0);
      else if (e.which === 32) placeBomb();
    });

    // Mobile Button Listeners
    document.getElementById('up').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(-1, 0); });
    document.getElementById('down').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(1, 0); });
    document.getElementById('left').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(0, -1); });
    document.getElementById('right').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(0, 1); });
    document.getElementById('bomb').addEventListener('touchstart', (e) => { e.preventDefault(); placeBomb(); });

    // Game Loop
    let last;
    function loop(timestamp) {
      requestAnimationFrame(loop);
      context.clearRect(0,0,canvas.width,canvas.height);
      if (!last) last = timestamp;
      let dt = timestamp - last;
      last = timestamp;

      for (let row = 0; row < numRows; row++) {
        for (let col = 0; col < numCols; col++) {
          if (cells[row][col] === types.wall) context.drawImage(wallCanvas, col * grid, row * grid);
          else if (cells[row][col] === types.softWall) context.drawImage(softWallCanvas, col * grid, row * grid);
        }
      }

      entities.forEach((entity) => { entity.update(dt); entity.render(); });
      entities = entities.filter((entity) => entity.alive);
      player.render();
    }

    generateLevel();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
