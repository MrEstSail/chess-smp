<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Chess | Analysis & Review</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        :root {
            --bg: #161512; --panel: #262421; --green: #81b64c;
            --brilliant: #15d0b1; --best: #95bb4a; --blunder: #fa412d;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Navigation */
        .nav { width: 100%; background: #1a1917; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 2px solid #333; }
        .logo { font-weight: bold; letter-spacing: 2px; font-size: 1.2rem; color: #eee; }
        
        /* Layout */
        .main-layout { display: flex; gap: 20px; width: 95%; max-width: 1200px; height: 85vh; margin-top: 15px; }
        
        /* Eval Bar (Hidden during play) */
        #evalContainer { width: 35px; height: 100%; background: #403d39; border-radius: 4px; overflow: hidden; display: none; flex-direction: column-reverse; position: relative; border: 2px solid #111; }
        #evalFill { background: white; width: 100%; height: 50%; transition: height 0.6s ease; }
        #evalValue { position: absolute; width: 100%; text-align: center; bottom: 8px; color: black; font-weight: bold; font-size: 0.75rem; z-index: 10; }

        .board-box { width: 600px; }
        .sidebar { flex: 1; background: var(--panel); border-radius: 6px; display: flex; flex-direction: column; padding: 20px; border: 1px solid #3d3a37; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Move History & Labels */
        .history { flex: 1; background: #1a1917; margin: 15px 0; overflow-y: auto; padding: 10px; border-radius: 4px; border: 1px solid #111; }
        .move-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; font-size: 0.95rem; align-items: center; }
        .analysis-mark { font-weight: bold; font-size: 0.85rem; padding: 2px 6px; border-radius: 3px; }

        /* Graph Canvas */
        #graphBox { background: #111; border-radius: 4px; margin-bottom: 10px; display: none; padding: 5px; border: 1px solid #444; }
        canvas { width: 100%; height: 70px; }
        
        /* UI Components */
        button { background: #45423e; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #555; transform: translateY(-1px); }
        .btn-green { background: var(--green); }
        .btn-green:hover { background: #92c65d; }

        /* Review Modal */
        #reviewOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .acc-circle { width: 150px; height: 150px; border: 10px solid var(--green); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 25px; box-shadow: 0 0 30px rgba(129, 182, 76, 0.2); }
        .stats-grid { display: flex; gap: 30px; background: #1a1917; padding: 25px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; }
        .stat-item { text-align: center; width: 70px; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">GRANDMASTER PRO</div>
    <div style="display: flex; gap: 10px;">
        <button onclick="location.reload()">New Game</button>
        <button class="btn-green" id="reviewBtn" style="display:none;" onclick="startDeepAnalysis()">🔍 Run Review</button>
    </div>
</div>

<div class="main-layout">
    <div id="evalContainer">
        <div id="evalFill"></div>
        <div id="evalValue">0.0</div>
    </div>

    <div class="board-box">
        <div id="board"></div>
    </div>

    <div class="sidebar">
        <h3 id="gameStatus" style="margin:0; color: var(--green);">Match Started</h3>
        <div id="graphBox"><canvas id="evalGraph"></canvas></div>
        <div class="history" id="moveLog"></div>
        <div id="loadingText" style="display:none; text-align:center; color: var(--green); animation: pulse 1.5s infinite;">
            Analyzing moves...
        </div>
    </div>
</div>

<div id="reviewOverlay">
    <div class="acc-circle">
        <span style="font-size: 0.9rem; opacity: 0.8;">Accuracy</span>
        <strong id="accPercent" style="font-size: 2.5rem;">--</strong>
    </div>
    <div class="stats-grid">
        <div class="stat-item"><div style="color:var(--brilliant); font-size:1.8rem;">!!</div><div>Brilliant</div><div id="brillCount">0</div></div>
        <div class="stat-item"><div style="color:var(--best); font-size:1.8rem;">★</div><div>Best</div><div id="bestCount">0</div></div>
        <div class="stat-item"><div style="color:var(--blunder); font-size:1.8rem;">??</div><div>Blunder</div><div id="blunderCount">0</div></div>
    </div>
    <button class="btn-green" style="width: 250px; font-size: 1.1rem;" onclick="$('#reviewOverlay').fadeOut()">Show Board Analysis</button>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
    var board = null;
    var game = new Chess();
    var moveFens = [];
    var evalScores = [0];
    var isAnalyzing = false;
    var analysisIndex = 0;

    // Load Stockfish Engine
    const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
    stockfish.postMessage('uci');

    function onDragStart (source, piece) {
        if (game.game_over()) return false;
        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
    }

    function onDrop (source, target) {
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        
        moveFens.push(game.fen());
        updateUI(move);
        if (game.game_over()) $('#reviewBtn').fadeIn();
        
        // Auto-respond with Bot
        setTimeout(() => {
            if (game.game_over()) return;
            stockfish.postMessage(`position fen ${game.fen()}`);
            stockfish.postMessage('go depth 10');
        }, 400);
    }

    stockfish.onmessage = function(e) {
        if (e.data.startsWith('bestmove') && !isAnalyzing) {
            let m = e.data.split(' ')[1];
            let move = game.move({ from: m.substring(0,2), to: m.substring(2,4), promotion: 'q' });
            moveFens.push(game.fen());
            board.position(game.fen());
            updateUI(move);
        } else if (e.data.includes('score cp') && isAnalyzing) {
            let cp = parseInt(e.data.split('score cp ')[1]);
            // Flip for black turns
            if (analysisIndex % 2 !== 0) cp = -cp;
            evalScores.push(cp);
            runNextAnalysis();
        }
    };

    function updateUI(move) {
        let h = game.history();
        $('#moveLog').append(`
            <div class="move-row">
                <span>${h.length}. ${move.san}</span>
                <span id="mark-${h.length}" class="analysis-mark"></span>
            </div>
        `);
        $('#moveLog').scrollTop($('#moveLog')[0].scrollHeight);
        
        let status = game.turn() === 'w' ? "White to move" : "Black to move";
        if (game.in_checkmate()) status = "Game Over - Checkmate";
        $('#gameStatus').text(status);
    }

    // --- GAME REVIEW ENGINE ---
    function startDeepAnalysis() {
        isAnalyzing = true;
        analysisIndex = 0;
        evalScores = [0];
        $('#reviewBtn').hide();
        $('#loadingText').show();
        runNextAnalysis();
    }

    function runNextAnalysis() {
        if (analysisIndex < moveFens.length) {
            stockfish.postMessage(`position fen ${moveFens[analysisIndex]}`);
            stockfish.postMessage('go depth 12');
            analysisIndex++;
        } else {
            finishReview();
        }
    }

    function finishReview() {
        isAnalyzing = false;
        $('#loadingText').hide();
        $('#evalContainer, #graphBox').fadeIn();
        
        let stats = { brill:0, best:0, blund:0, totalAcc:0 };
        
        evalScores.forEach((cp, i) => {
            if (i === 0) return;
            let prevProb = winProb(evalScores[i-1]);
            let currProb = winProb(cp);
            let diff = Math.abs(prevProb - currProb);
            
            stats.totalAcc += Math.max(0, 100 - (diff * 2.8));

            let label = "", color = "";
            if (diff < 1.8) { label = "★"; color = "var(--best)"; stats.best++; }
            else if (diff > 22) { label = "??"; color = "var(--blunder)"; stats.blund++; }
            else if (diff < 0.4 && cp > 200) { label = "!!"; color = "var(--brilliant)"; stats.brill++; }
            
            $(`#mark-${i}`).text(label).css('color', color);
        });

        $('#accPercent').text((stats.totalAcc / moveFens.length).toFixed(1) + "%");
        $('#brillCount').text(stats.brill);
        $('#bestCount').text(stats.best);
        $('#blunderCount').text(stats.blund);
        
        drawEvalGraph();
        updateEvalBar(evalScores[evalScores.length - 1]);
        $('#reviewOverlay').css('display', 'flex').hide().fadeIn();
    }

    function winProb(cp) { return 50 + 50 * (2 / (1 + Math.exp(-0.0036 * cp)) - 1); }

    function updateEvalBar(cp) {
        let p = winProb(cp);
        $('#evalFill').css('height', p + '%');
        $('#evalValue').text((cp/100).toFixed(1));
    }

    function drawEvalGraph() {
        const c = document.getElementById('evalGraph');
        const ctx = c.getContext('2d');
        const w = c.width = c.offsetWidth, h = c.height = c.offsetHeight;
        ctx.strokeStyle = "#444"; ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
        ctx.strokeStyle = "var(--green)"; ctx.lineWidth = 2; ctx.beginPath();
        evalScores.forEach((cp, i) => {
            let x = (i/(evalScores.length-1))*w;
            let y = h/2 - (Math.max(-800, Math.min(800, cp))/800)*(h/2);
            i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.stroke();
    }

    board = Chessboard('board', {
        draggable: true, position: 'start',
        onDragStart: onDragStart, onDrop: onDrop,
        onSnapEnd: () => board.position(game.fen())
    });
</script>

</body>
</html>
