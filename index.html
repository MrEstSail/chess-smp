<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Chess SMP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>♟ Chess SMP</h1>

<div class="topButtons">
<button onclick="newGame()">New Game</button>
<button onclick="chooseBot()">Play Bot</button>
</div>

</header>

<div class="layout">

<div class="side">

<h3 id="whiteCapturedTitle"></h3>

<div id="whiteCaptured"></div>

</div>

<div class="boardArea">

<div id="board"></div>

</div>

<div class="side">

<h3>Game Review</h3>

<canvas id="evalChart"></canvas>

<div id="stats"></div>

</div>

</div>


<audio id="moveSound"
src="http://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-self.mp3"></audio>

<audio id="captureSound"
src="http://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/capture.mp3"></audio>

<audio id="notifySound"
src="http://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/notify.mp3"></audio>


<script src="openings.js"></script>
<script src="script.js"></script>

</body>
</html>
