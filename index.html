<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess SMP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="app">

<header>
  <h1>♟ Chess SMP</h1>
  <div>
    <button onclick="chooseBot()">Play Bot</button>
    <button onclick="newGame()">New Game</button>
  </div>
</header>

<div class="layout">

  <div class="side">
    <h3 id="whiteCapturedTitle"></h3>
    <div id="whiteCaptured"></div>
  </div>

  <div class="board-area">
    <div id="board"></div>
  </div>

  <div class="side">
    <h3>Game Review</h3>
    <canvas id="evalChart"></canvas>
    <div id="stats"></div>
  </div>

</div>

<audio id="moveSound" src="sounds/move.mp3"></audio>
<audio id="captureSound" src="sounds/capture.mp3"></audio>
<audio id="brilliantSound" src="sounds/brilliant.mp3"></audio>

<script src="openings.js"></script>
<script src="script.js"></script>

</body>
</html>
