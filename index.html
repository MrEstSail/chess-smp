<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Arena Pro</title>

<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<style>
body {
    margin:0;
    background:#121212;
    color:white;
    font-family:Segoe UI, sans-serif;
}

/* TOP BAR */
.topbar {
    background:#1e1e1e;
    padding:10px 20px;
    display:flex;
    justify-content:flex-end;
}
.topbar button {
    background:#81b64c;
    border:none;
    padding:8px 15px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}
.topbar button:hover { background:#a3d16a; }

/* LAYOUT */
.main {
    display:flex;
    justify-content:center;
    gap:30px;
    padding:30px;
}

#board { width:600px; }

.side {
    width:350px;
    background:#1f1f1f;
    padding:20px;
    border-radius:10px;
}

.player-box {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#2a2a2a;
    padding:10px;
    border-radius:6px;
    margin-bottom:10px;
}

.captured { color:#aaa; font-size:18px; }

/* MODALS */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#1f1f1f;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

input {
    width:100%;
    padding:8px;
    margin-top:10px;
    border-radius:4px;
    border:none;
}
button.full {
    width:100%;
    margin-top:10px;
}
.hidden { display:none; }

select {
    width:100%;
    padding:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="openPlayModal()">Play</button>
</div>

<!-- Nickname Modal -->
<div id="nicknameModal" class="modal">
<div class="modal-box">
<h3>Enter your nickname</h3>
<input id="nicknameInput">
<button class="full" onclick="setNickname()">Enter</button>
</div>
</div>

<!-- Play Modal -->
<div id="playModal" class="modal hidden">
<div class="modal-box">
<h3>Who do you want to play?</h3>
<input id="opponentInput" placeholder="Username or Bot">
<button class="full" onclick="startMatch()">Start Game</button>
<button class="full" onclick="closePlayModal()">Cancel</button>
</div>
</div>

<div class="main">

<div id="board"></div>

<div class="side">

<div class="player-box">
<div id="topPlayer">Bot</div>
<div class="captured" id="topCaptured"></div>
</div>

<div class="player-box">
<div id="bottomPlayer">You</div>
<div class="captured" id="bottomCaptured"></div>
</div>

<select id="botSelect">
<option value="200">🥴 Drunk Noob (200 Elo)</option>
<option value="1000">😎 Casual Joe (1000 Elo)</option>
<option value="max">🤖 Chaos Engine (Max Strength)</option>
</select>

</div>
</div>

<script>
let nickname="";
let opponent="";
let game = new Chess();
let board;

let engine = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
engine.postMessage("uci");

let existingUsers=["Alice","Bob","Charlie"];

const bots={
200:{name:"Drunk Noob 🥴"},
1000:{name:"Casual Joe 😎"},
max:{name:"Chaos Engine 🤖🔥"}
};

function setNickname(){
    nickname=document.getElementById("nicknameInput").value.trim();
    if(!nickname) return alert("Enter nickname");
    document.getElementById("nicknameModal").classList.add("hidden");
    document.getElementById("bottomPlayer").innerText=nickname;
}

function openPlayModal(){
    document.getElementById("playModal").classList.remove("hidden");
}

function closePlayModal(){
    document.getElementById("playModal").classList.add("hidden");
}

function startMatch(){
    let name=document.getElementById("opponentInput").value.trim();
    if(!name) return;

    if(bots[name]){
        opponent=bots[name].name;
        document.getElementById("topPlayer").innerText=opponent;
        closePlayModal();
        resetGame();
        return;
    }

    if(existingUsers.includes(name)){
        opponent=name;
        document.getElementById("topPlayer").innerText=opponent;
        closePlayModal();
        resetGame();
    } else {
        alert("User does not exist.");
    }
}

function resetGame(){
    game.reset();
    board.start();
    updateCaptured();
}

function updateCaptured(){
    const pieces = game.board().flat().filter(p=>p);
    const start={p:8,n:2,b:2,r:2,q:1};
    let w={p:0,n:0,b:0,r:0,q:0};
    let b={p:0,n:0,b:0,r:0,q:0};
    pieces.forEach(p=>p.color==="w"?w[p.type]++:b[p.type]++);
    let syms={p:"♟",n:"♞",b:"♝",r:"♜",q:"♛"};

    let top="", bottom="";
    for(let t in start){
        for(let i=0;i<(start[t]-w[t]);i++) top+=syms[t];
        for(let i=0;i<(start[t]-b[t]);i++) bottom+=syms[t];
    }
    document.getElementById("topCaptured").innerText=top;
    document.getElementById("bottomCaptured").innerText=bottom;
}

function onDrop(source,target){
    let move=game.move({from:source,to:target,promotion:'q'});
    if(!move) return "snapback";
    updateCaptured();

    if(opponent && bots){
        setTimeout(botMove,300);
    }
}

function botMove(){
    engine.postMessage("position fen "+game.fen());
    engine.postMessage("go depth "+(document.getElementById("botSelect").value==="200"?2:
                                     document.getElementById("botSelect").value==="1000"?6:18));
    engine.onmessage=function(e){
        if(e.data.startsWith("bestmove")){
            let m=e.data.split(" ")[1];
            game.move({from:m.substr(0,2),to:m.substr(2,2),promotion:'q'});
            board.position(game.fen());
            updateCaptured();
        }
    }
}

board = Chessboard('board',{
    draggable:true,
    position:'start',
    onDrop:onDrop
});
</script>

</body>
</html>
